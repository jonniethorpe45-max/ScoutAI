name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  check:
    name: Install · Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scoutai
          POSTGRES_PASSWORD: scoutai
          POSTGRES_DB: scoutai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scoutai -d scoutai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://scoutai:scoutai@127.0.0.1:5432/scoutai?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      SESSION_SECRET: ci-only-session-secret-min-32-chars!!
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      LOG_LEVEL: info

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm db:migrate:deploy

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build
